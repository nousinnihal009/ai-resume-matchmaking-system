name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  backend-lint:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/core/config.py
          python -m py_compile app/core/security.py
          python -m py_compile app/api/auth.py
          python -m py_compile app/api/resumes.py
          python -m py_compile app/api/jobs.py
          python -m py_compile app/api/matches.py
          python -m py_compile app/api/analytics.py

  backend-tests:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests (excluding slow)
        run: pytest -m "not slow" --tb=short
      - name: Run test coverage
        run: pytest -m "not slow" --cov=app --cov-report=term-missing

  security-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies and security tools
        run: |
          pip install -r requirements.txt
          pip install safety bandit
      - name: Run Bandit (Static Analysis)
        run: bandit -r app/ -c pyproject.toml || bandit -r app/
      - name: Run Safety (Dependency Audit)
        run: safety check -r requirements.txt || true # Ignore failure for now but log

  docker-compose-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet
        env:
          SECRET_KEY: ci-test-secret-key
          POSTGRES_PASSWORD: ci-test-password

  docker-build:
    name: Production Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker compose -f docker-compose.yml build backend
      - name: Inspect image size
        run: docker images
